services:
  app:
    build:
      context: ./app
      target: dev
    ports:
      - "5173:5173"
      - "8000:8000"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - DATABASE_URL=postgresql://marketplace:marketplace@db:5432/marketplace
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llava:7b
      - RUN_DB_SEED=true
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        for i in $(seq 1 30); do
          ollama list >/dev/null 2>&1 && break
          sleep 1
        done
        ollama pull llava:7b || echo "Warning: failed to pull llava:7b; AI features unavailable"
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # GPU passthrough (uncomment if you have NVIDIA GPU + nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  pgdata:
  ollama_data:
