services:
  app:
    build:
      context: ./app
      target: dev
    ports:
      - "5173:5173"
      - "8000:8000"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - DATABASE_URL=postgresql://marketplace:marketplace@db:5432/marketplace
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
